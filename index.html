<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Meu Amor ❤️🫶</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}

.container{
background: rgba(0,0,0,0.25);
padding:40px;
border-radius:20px;
width:90%;
max-width:600px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.6;
}

img{
width:250px;
border-radius:20px;
margin:20px 0;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b7d;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
bottom:-20px;
font-size:24px;
animation: subir 5s linear infinite;
}

@keyframes subir{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1>Para o Amor da Minha Vida 💖</h1>

<img src="amor.jpg.jpeg" alt="amor">

<p>
Meu amor ❤️ <br><br>
Desde que você entrou na minha vida tudo ficou mais bonito.  
Seu sorriso ilumina meus dias e seu amor faz meu coração bater mais forte.  
Quero viver muitos momentos incríveis ao seu lado.  
<br><br>
Eu te amo muito! 💕🥰🌹
</p>

<button onclick="mensagem()">Clique aqui ❤️</button>

</div>

<script>

function mensagem(){
alert("Você é a melhor coisa que já aconteceu na minha vida! 💖");
}

function criarCoracao(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left = Math.random()*100+"vw";
heart.style.fontSize = (20+Math.random()*20)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(criarCoracao,400);

</script>

</body>
</html>
